# ==============================================================================
# Grafana Dashboard Provisioning
# ==============================================================================

apiVersion: 1

providers:
  - name: "Nemo Dashboards"
    orgId: 1
    folder: "Nemo"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
