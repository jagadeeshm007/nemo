# ==============================================================================
# Promtail Configuration — Log collector shipping to Loki
# ==============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs via Docker SD ────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: "unix:///var/run/docker.sock"
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=nemo"]

    relabel_configs:
      # Use container name as the instance label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # Use compose service name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      # Set the job label
      - replacement: "nemo"
        target_label: "job"

    pipeline_stages:
      # Parse Docker JSON log format
      - docker: {}

      # Parse JSON log lines from Go (zerolog) and Python (uvicorn/structlog)
      - json:
          expressions:
            level: level
            msg: message
            log_type: log_type

      - labels:
          level:
          log_type:
