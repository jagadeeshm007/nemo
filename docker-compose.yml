# ==============================================================================
# Nemo Platform — Docker Compose (Development)
# ==============================================================================

services:
  # ============================================================================
  # Infrastructure
  # ============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: nemo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nemo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nemo_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-nemo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nemo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nemo-network

  redis:
    image: redis:7-alpine
    container_name: nemo-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nemo-network

  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: nemo-chromadb
    ports:
      - "8005:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    networks:
      - nemo-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nemo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - nemo-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nemo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - nemo-network

  # ============================================================================
  # Application Services
  # ============================================================================

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: nemo-api-gateway
    restart: on-failure
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
      - "${GATEWAY_GRPC_PORT:-9090}:9090"
    environment:
      - NEMO_ENV=${NEMO_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-nemo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nemo_secret_change_me}
      - POSTGRES_DB=${POSTGRES_DB:-nemo}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
      - AI_SERVICE_GRPC=ai-service:50051
      - PLUGIN_SERVICE_GRPC=plugin-service:50052
      - WORKFLOW_SERVICE_GRPC=workflow-service:50053
      - VECTOR_SERVICE_GRPC=vector-service:50054
      - JWT_SECRET=${GATEWAY_JWT_SECRET:-change-this-to-a-real-secret-in-production}
      - RATE_LIMIT_RPS=${GATEWAY_RATE_LIMIT_RPS:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - nemo-network

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: nemo-ai-service
    ports:
      - "${AI_SERVICE_PORT:-8001}:8001"
      - "50051:50051"
    environment:
      - NEMO_ENV=${NEMO_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-nemo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nemo_secret_change_me}
      - POSTGRES_DB=${POSTGRES_DB:-nemo}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - PLUGIN_SERVICE_GRPC=plugin-service:50052
      - WORKFLOW_SERVICE_GRPC=workflow-service:50053
      - VECTOR_SERVICE_GRPC=vector-service:50054
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - nemo-network

  plugin-service:
    build:
      context: ./services/plugin-service
      dockerfile: Dockerfile
    container_name: nemo-plugin-service
    ports:
      - "${PLUGIN_SERVICE_PORT:-8002}:8002"
      - "50052:50052"
    environment:
      - NEMO_ENV=${NEMO_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-nemo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nemo_secret_change_me}
      - POSTGRES_DB=${POSTGRES_DB:-nemo}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - nemo-network

  workflow-service:
    build:
      context: ./services/workflow-service
      dockerfile: Dockerfile
    container_name: nemo-workflow-service
    ports:
      - "${WORKFLOW_SERVICE_PORT:-8003}:8003"
      - "50053:50053"
    environment:
      - NEMO_ENV=${NEMO_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-nemo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nemo_secret_change_me}
      - POSTGRES_DB=${POSTGRES_DB:-nemo}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
      - AI_SERVICE_GRPC=ai-service:50051
      - PLUGIN_SERVICE_GRPC=plugin-service:50052
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - nemo-network

  vector-service:
    build:
      context: ./services/vector-service
      dockerfile: Dockerfile
    container_name: nemo-vector-service
    ports:
      - "${VECTOR_SERVICE_PORT:-8004}:8004"
      - "50054:50054"
    environment:
      - NEMO_ENV=${NEMO_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-nemo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nemo_secret_change_me}
      - POSTGRES_DB=${POSTGRES_DB:-nemo}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - nemo-network

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: nemo-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - nemo-network

  # ============================================================================
  # Observability
  # ============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: nemo-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - nemo-network

  loki:
    image: grafana/loki:latest
    container_name: nemo-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - nemo-network

  promtail:
    image: grafana/promtail:latest
    container_name: nemo-promtail
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - nemo-network

  grafana:
    image: grafana/grafana:latest
    container_name: nemo-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - nemo-network

# ==============================================================================
# Volumes
# ==============================================================================

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  kafka_data:
  zookeeper_data:
  prometheus_data:
  loki_data:
  grafana_data:

# ==============================================================================
# Networks
# ==============================================================================

networks:
  nemo-network:
    driver: bridge
