# ==============================================================================
# Nemo Platform — Production Overrides
# Usage: docker compose -f docker-compose.base.yml -f docker-compose.prod.yml up -d
# ==============================================================================

services:
  # ============================================================================
  # Traefik — Prod: HTTPS only, Let's Encrypt, hardened
  # ============================================================================
  traefik:
    ports:
      - "80:80"
      - "443:443"
      - "9090:9090"
    command:
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    labels:
      # Force HTTPS redirect
      - "traefik.http.routers.http-catchall.rule=HostRegexp(`.+`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https@file"
      # Dashboard requires auth in prod
      - "traefik.http.routers.traefik-dashboard.middlewares=admin-auth@file,secure-headers@file"

  # ============================================================================
  # Infrastructure — Prod: NO exposed ports (internal only)
  # ============================================================================
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Must be set, no default

  redis:
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  # ============================================================================
  # Application — Prod: no debug ports, production logging
  # ============================================================================
  api-gateway:
    environment:
      - NEMO_LOG_LEVEL=info
      - NEMO_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  ai-service:
    environment:
      - NEMO_LOG_LEVEL=info
      - NEMO_ENV=production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  plugin-service:
    environment:
      - NEMO_LOG_LEVEL=info
      - NEMO_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  workflow-service:
    environment:
      - NEMO_LOG_LEVEL=info
      - NEMO_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  vector-service:
    environment:
      - NEMO_LOG_LEVEL=info
      - NEMO_ENV=production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  frontend:
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}

  # ============================================================================
  # Observability — Prod: auth-protected, no direct ports
  # ============================================================================
  prometheus:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prometheus.middlewares=admin-auth@file,secure-headers@file"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
