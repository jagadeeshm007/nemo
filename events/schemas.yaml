# ==============================================================================
# Nemo Platform — Kafka Event Schema Definitions
# ==============================================================================
#
# This file defines all event types, their topics, and payload schemas
# used across the platform's event-driven architecture.
#
# All events use a common envelope:
#   {
#     "event_id":   "uuid",
#     "event_type": "domain.action",
#     "source":     "service-name",
#     "timestamp":  "ISO-8601",
#     "payload":    { ... }
#   }
# ==============================================================================

topics:
  # ── Document Pipeline ──────────────────────────────────────────────────
  - name: nemo.documents.uploaded
    description: "Emitted when a document is uploaded and ingestion starts"
    partitions: 3
    retention_ms: 604800000 # 7 days
    events:
      - type: document.uploaded
        source: api-gateway
        payload:
          document_id: string
          filename: string
          collection: string
          mime_type: string
          file_size_bytes: integer
          user_id: string

      - type: document.indexed
        source: vector-service
        payload:
          document_id: string
          filename: string
          collection: string
          chunk_count: integer
          embedding_model: string

      - type: document.failed
        source: vector-service
        payload:
          document_id: string
          filename: string
          error: string

      - type: document.deleted
        source: vector-service
        payload:
          document_id: string
          collection: string

  # ── Embedding Pipeline ─────────────────────────────────────────────────
  - name: nemo.embeddings.generated
    description: "Emitted after embeddings are generated for document chunks"
    partitions: 3
    retention_ms: 259200000 # 3 days
    events:
      - type: embeddings.batch_completed
        source: vector-service
        payload:
          document_id: string
          chunk_count: integer
          model: string
          dimensions: integer
          duration_ms: float

  # ── Query Pipeline ────────────────────────────────────────────────────
  - name: nemo.queries.requested
    description: "Emitted for each user query (chat or search)"
    partitions: 6
    retention_ms: 604800000
    events:
      - type: query.chat
        source: api-gateway
        payload:
          conversation_id: string
          user_id: string
          model: string
          message_count: integer

      - type: query.search
        source: vector-service
        payload:
          collection: string
          query_length: integer
          top_k: integer
          result_count: integer

  # ── Tool Execution ────────────────────────────────────────────────────
  - name: nemo.tools.executed
    description: "Emitted when a tool/plugin action is executed"
    partitions: 3
    retention_ms: 604800000
    events:
      - type: tool.executed
        source: plugin-service
        payload:
          plugin_id: string
          action: string
          success: boolean
          duration_ms: float
          user_id: string

      - type: tool.failed
        source: plugin-service
        payload:
          plugin_id: string
          action: string
          error: string

  # ── Workflow Events ───────────────────────────────────────────────────
  - name: nemo.workflows.completed
    description: "Emitted when a workflow run completes successfully"
    partitions: 3
    retention_ms: 604800000
    events:
      - type: workflow.completed
        source: workflow-service
        payload:
          run_id: string
          workflow_id: string
          step_count: integer
          duration_ms: float
          user_id: string

  - name: nemo.workflows.failed
    description: "Emitted when a workflow run fails"
    partitions: 3
    retention_ms: 604800000
    events:
      - type: workflow.failed
        source: workflow-service
        payload:
          run_id: string
          workflow_id: string
          failed_step: string
          error: string

  # ── Plugin Lifecycle ──────────────────────────────────────────────────
  - name: nemo.plugins.state_changed
    description: "Emitted when a plugin state changes"
    partitions: 1
    retention_ms: 604800000
    events:
      - type: plugin.activated
        source: plugin-service
        payload:
          plugin_id: string
          previous_state: string
          new_state: string

      - type: plugin.deactivated
        source: plugin-service
        payload:
          plugin_id: string
          reason: string

      - type: plugin.error
        source: plugin-service
        payload:
          plugin_id: string
          error: string

  # ── Model Configuration ──────────────────────────────────────────────
  - name: nemo.models.config_changed
    description: "Emitted when model configuration is updated"
    partitions: 1
    retention_ms: 604800000
    events:
      - type: models.config_reloaded
        source: ai-service
        payload:
          provider_count: integer
          model_count: integer
          changed_by: string

      - type: models.provider_error
        source: ai-service
        payload:
          provider: string
          error: string

  # ── Audit Trail ──────────────────────────────────────────────────────
  - name: nemo.audit.events
    description: "All user-facing actions for compliance and debugging"
    partitions: 6
    retention_ms: 2592000000 # 30 days
    events:
      - type: audit.user_action
        source: api-gateway
        payload:
          user_id: string
          action: string
          resource_type: string
          resource_id: string
          ip_address: string
          details: object

  # ── Platform Metrics ─────────────────────────────────────────────────
  - name: nemo.metrics.events
    description: "High-frequency operational metrics for analytics"
    partitions: 6
    retention_ms: 86400000 # 1 day
    events:
      - type: metrics.llm_usage
        source: ai-service
        payload:
          model: string
          provider: string
          prompt_tokens: integer
          completion_tokens: integer
          total_tokens: integer
          cost_usd: float
          latency_ms: float
          user_id: string

      - type: metrics.request
        source: api-gateway
        payload:
          method: string
          path: string
          status_code: integer
          latency_ms: float
          user_id: string
