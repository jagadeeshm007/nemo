# ==============================================================================
# AI Service — Kubernetes Deployment
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: nemo
  labels:
    app: ai-service
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/part-of: nemo
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
        app.kubernetes.io/name: ai-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nemo-ai-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: ai-service
          image: ghcr.io/jagadeeshm007/nemo/ai-service:latest
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: NEMO_ENV
              value: production
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: nemo-db-credentials
                  key: host
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nemo-db-credentials
                  key: password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: nemo-redis-credentials
                  key: host
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: nemo-infra-config
                  key: kafka-brokers
            - name: CHROMADB_HOST
              value: chromadb.nemo-infra
            - name: ELASTICSEARCH_URL
              value: http://elasticsearch.nemo-infra:9200
            - name: VAULT_ADDR
              value: http://vault.nemo-infra:8200
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.nemo-monitoring:4317
            - name: OTEL_SERVICE_NAME
              value: ai-service
            - name: UNLEASH_URL
              value: http://unleash.nemo-infra:4242/api
            - name: TEMPORAL_HOST
              value: temporal.nemo-infra:7233
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: nemo
  labels:
    app: ai-service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8001
      targetPort: http
  selector:
    app: ai-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service
  namespace: nemo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-service
  namespace: nemo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-service
