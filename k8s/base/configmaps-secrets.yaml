# ==============================================================================
# ConfigMaps & Secrets Templates
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemo-infra-config
  namespace: nemo
  labels:
    app.kubernetes.io/part-of: nemo
data:
  kafka-brokers: "kafka.nemo-infra:9092"
  chromadb-host: "chromadb.nemo-infra"
  chromadb-port: "8000"
  elasticsearch-url: "http://elasticsearch.nemo-infra:9200"
  temporal-host: "temporal.nemo-infra:7233"
  temporal-namespace: "nemo"
  vault-addr: "http://vault.nemo-infra:8200"
  unleash-url: "http://unleash.nemo-infra:4242/api"
  otel-endpoint: "http://otel-collector.nemo-monitoring:4317"
  keycloak-url: "http://keycloak.nemo-infra:8080"
  keycloak-realm: "nemo"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemo-model-gateway-config
  namespace: nemo
  labels:
    app.kubernetes.io/part-of: nemo
data:
  model-gateway.yaml: |
    # Mounted from configs/model-gateway.yaml
    # Managed by Kustomize configMapGenerator in overlays
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemo-hybrid-search-config
  namespace: nemo
  labels:
    app.kubernetes.io/part-of: nemo
data:
  hybrid-search.yaml: |
    # Mounted from configs/hybrid-search.yaml
    # Managed by Kustomize configMapGenerator in overlays
---
# Secret templates — values injected by Vault Agent or External Secrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: nemo-db-credentials
  namespace: nemo
  labels:
    app.kubernetes.io/part-of: nemo
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "nemo-app"
    vault.hashicorp.com/agent-inject-secret-db: "secret/data/nemo/database"
type: Opaque
stringData:
  host: "postgres.nemo-infra"
  port: "5432"
  database: "nemo"
  username: "nemo"
  password: "REPLACE_WITH_VAULT_OR_SEALED_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: nemo-redis-credentials
  namespace: nemo
  labels:
    app.kubernetes.io/part-of: nemo
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "nemo-app"
    vault.hashicorp.com/agent-inject-secret-redis: "secret/data/nemo/redis"
type: Opaque
stringData:
  host: "redis.nemo-infra"
  port: "6379"
  password: "REPLACE_WITH_VAULT_OR_SEALED_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: nemo-llm-credentials
  namespace: nemo
  labels:
    app.kubernetes.io/part-of: nemo
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "nemo-app"
    vault.hashicorp.com/agent-inject-secret-llm: "secret/data/nemo/llm"
type: Opaque
stringData:
  openai-api-key: "REPLACE_WITH_VAULT_OR_SEALED_SECRET"
  anthropic-api-key: "REPLACE_WITH_VAULT_OR_SEALED_SECRET"
  google-api-key: "REPLACE_WITH_VAULT_OR_SEALED_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: nemo-oauth-credentials
  namespace: nemo
  labels:
    app.kubernetes.io/part-of: nemo
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "nemo-app"
    vault.hashicorp.com/agent-inject-secret-oauth: "secret/data/nemo/oauth"
type: Opaque
stringData:
  keycloak-client-secret: "REPLACE_WITH_VAULT_OR_SEALED_SECRET"
  jwt-secret: "REPLACE_WITH_VAULT_OR_SEALED_SECRET"
