# ==============================================================================
# API Gateway — Kubernetes Deployment
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nemo
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: nemo
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nemo-api-gateway
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway
          image: ghcr.io/jagadeeshm007/nemo/api-gateway:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: NEMO_ENV
              value: production
            - name: NEMO_LOG_LEVEL
              value: info
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: nemo-db-credentials
                  key: host
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nemo-db-credentials
                  key: password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: nemo-redis-credentials
                  key: host
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nemo-redis-credentials
                  key: password
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: nemo-infra-config
                  key: kafka-brokers
            - name: VAULT_ADDR
              value: http://vault.nemo-infra:8200
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.nemo-monitoring:4317
            - name: OTEL_SERVICE_NAME
              value: api-gateway
            - name: UNLEASH_URL
              value: http://unleash.nemo-infra:4242/api
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nemo
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
  selector:
    app: api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: nemo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway
  namespace: nemo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
