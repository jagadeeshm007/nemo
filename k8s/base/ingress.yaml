# ==============================================================================
# Ingress — NGINX Ingress Controller Rules
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nemo-ingress
  namespace: nemo
  labels:
    app.kubernetes.io/part-of: nemo
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://nemo.local"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Request-ID"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - nemo.local
        - api.nemo.local
        - auth.nemo.local
        - grafana.nemo.local
      secretName: nemo-tls-cert
  rules:
    # Frontend
    - host: nemo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    # API Gateway
    - host: api.nemo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
    # Keycloak
    - host: auth.nemo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
    # Grafana
    - host: grafana.nemo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
# gRPC Ingress (separate for gRPC-specific annotations)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nemo-grpc-ingress
  namespace: nemo
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - grpc.nemo.local
      secretName: nemo-grpc-tls-cert
  rules:
    - host: grpc.nemo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 9090
