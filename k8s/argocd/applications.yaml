# ==============================================================================
# Argo CD — Application: nemo-apps (Dev)
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nemo-apps-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nemo
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nemo

  source:
    repoURL: https://github.com/jagadeeshm007/nemo.git
    targetRevision: develop
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: nemo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/minReplicas
        - /spec/maxReplicas

  revisionHistoryLimit: 10
---
# ==============================================================================
# Argo CD — Application: nemo-apps (Staging)
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nemo-apps-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nemo
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nemo

  source:
    repoURL: https://github.com/jagadeeshm007/nemo.git
    targetRevision: staging
    path: k8s/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: nemo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
