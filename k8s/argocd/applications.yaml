      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 10
---
# ==============================================================================
# Argo CD — Application: nemo-apps (Production)
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nemo-apps-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nemo
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nemo

  source:
    repoURL: https://github.com/jagadeeshm007/nemo.git
    targetRevision: main
    path: k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: nemo

  syncPolicy:
    # Production: MANUAL sync — requires explicit approval
    automated: null
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 2
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

  revisionHistoryLimit: 20
