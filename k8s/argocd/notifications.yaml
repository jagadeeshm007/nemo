# ==============================================================================
# Argo CD — Notifications Configuration
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # -------------------------------------------------------
  # Triggers
  # -------------------------------------------------------
  trigger.on-sync-succeeded: |
    - description: Application sync succeeded
      send:
        - app-sync-succeeded
      when: app.status.operationState.phase in ['Succeeded']

  trigger.on-sync-failed: |
    - description: Application sync failed
      send:
        - app-sync-failed
      when: app.status.operationState.phase in ['Error', 'Failed']

  trigger.on-health-degraded: |
    - description: Application health degraded
      send:
        - app-health-degraded
      when: app.status.health.status == 'Degraded'

  trigger.on-deployed: |
    - description: Application successfully deployed
      oncePer: app.status.sync.revision
      send:
        - app-deployed
      when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'

  # -------------------------------------------------------
  # Templates (GitHub-compatible)
  # -------------------------------------------------------
  template.app-sync-succeeded: |
    message: |
      Application {{.app.metadata.name}} sync succeeded.
      Revision: {{.app.status.sync.revision}}
      Environment: {{.app.metadata.labels.environment}}

  template.app-sync-failed: |
    message: |
      Application {{.app.metadata.name}} sync FAILED!
      Revision: {{.app.status.sync.revision}}
      Error: {{.app.status.operationState.message}}

  template.app-health-degraded: |
    message: |
      Application {{.app.metadata.name}} health is DEGRADED.
      Status: {{.app.status.health.status}}

  template.app-deployed: |
    message: |
      Application {{.app.metadata.name}} deployed successfully.
      Revision: {{.app.status.sync.revision}}
      Health: {{.app.status.health.status}}

  # -------------------------------------------------------
  # Subscriptions (default)
  # -------------------------------------------------------
  subscriptions: |
    - recipients:
        - github
      triggers:
        - on-sync-succeeded
        - on-sync-failed
        - on-health-degraded
        - on-deployed
