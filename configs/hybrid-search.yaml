# ==============================================================================
# Nemo — Hybrid Search Configuration
# ==============================================================================

hybrid_search:
  enabled: true

  # Vector search (ChromaDB)
  vector:
    provider: chromadb
    host: chromadb
    port: 8000
    default_collection: documents
    similarity_metric: cosine
    top_k: 20

  # Keyword search (Elasticsearch)
  keyword:
    provider: elasticsearch
    hosts:
      - http://elasticsearch:9200
    default_index: nemo-documents
    top_k: 20
    index_settings:
      number_of_shards: 1
      number_of_replicas: 0
      analysis:
        analyzer:
          nemo_analyzer:
            type: custom
            tokenizer: standard
            filter:
              - lowercase
              - stop
              - snowball

  # Result fusion
  fusion:
    strategy: reciprocal_rank_fusion # rrf | weighted_sum | learned
    rrf_k: 60 # RRF constant
    vector_weight: 0.6
    keyword_weight: 0.4

  # Reranking
  reranker:
    enabled: true
    provider: cross_encoder # cohere | cross_encoder | bge
    model: cross-encoder/ms-marco-MiniLM-L-6-v2
    top_k: 10 # Final results after reranking
    batch_size: 32

  # Document indexing
  indexing:
    chunk_size: 512
    chunk_overlap: 50
    embedding_model: text-embedding-3-small
    embedding_dimensions: 1536
    sync_to_elasticsearch: true
