# ==============================================================================
# CI — API Gateway (Go)
# ==============================================================================
name: CI — API Gateway

on:
  push:
    branches: [main]
    paths:
      - "services/api-gateway/**"
      - "proto/**"
      - ".github/workflows/ci-gateway.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/api-gateway/**"
      - "proto/**"
      - ".github/workflows/ci-gateway.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: services/api-gateway

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/api-gateway/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.57
          working-directory: services/api-gateway
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/api-gateway/go.sum

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-coverage
          path: services/api-gateway/coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/api-gateway/go.sum

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-w -s" -o ./bin/api-gateway ./cmd/gateway/main.go

      - name: Verify binary exists
        run: test -f ./bin/api-gateway && echo "Build successful"
