# ==============================================================================
# CI — Frontend (Next.js)
# ==============================================================================
name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - "services/frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/frontend/**"
      - ".github/workflows/ci-frontend.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: services/frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
