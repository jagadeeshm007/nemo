# ==============================================================================
# CI — Kubernetes Manifest Validation
# ==============================================================================
name: CI — Kubernetes

on:
  push:
    branches: [main, develop]
    paths:
      - "k8s/**"
      - "proto/**"
  pull_request:
    branches: [main]
    paths:
      - "k8s/**"
      - "proto/**"

permissions:
  contents: read

jobs:
  validate-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"

      - name: Validate base kustomization
        run: |
          cd k8s/base
          kustomize build . > /dev/null
          echo "Base kustomization: OK"

      - name: Validate dev overlay
        run: |
          cd k8s/overlays/dev
          kustomize build . > /dev/null
          echo "Dev overlay: OK"

      - name: Validate staging overlay
        run: |
          cd k8s/overlays/staging
          kustomize build . > /dev/null
          echo "Staging overlay: OK"

      - name: Validate prod overlay
        run: |
          cd k8s/overlays/prod
          kustomize build . > /dev/null
          echo "Prod overlay: OK"

  kubeconform:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"

      - name: Validate with kubeconform
        run: |
          kustomize build k8s/base | kubeconform \
            -strict \
            -ignore-missing-schemas \
            -kubernetes-version 1.29.0 \
            -summary

  proto-lint:
    name: Protobuf Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.30.0"

      - name: Lint protos
        run: |
          if [ -f "buf.yaml" ]; then
            buf lint
          else
            echo "No buf.yaml found, skipping buf lint"
            find proto -name "*.proto" -exec protoc --proto_path=proto {} \; 2>&1 || true
          fi

  security-scan:
    name: Manifest Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "k8s/"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
