# ==============================================================================
# CD — Build & Deploy Pipeline
# ==============================================================================
name: CD — Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "terraform/**"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ============================================================================
  # Build container images
  # ============================================================================
  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - ai-service
          - plugin-service
          - workflow-service
          - vector-service
          - frontend
        include:
          - service: api-gateway
            context: ./services/api-gateway
          - service: ai-service
            context: ./services/ai-service
          - service: plugin-service
            context: ./services/plugin-service
          - service: workflow-service
            context: ./services/workflow-service
          - service: vector-service
            context: ./services/vector-service
          - service: frontend
            context: ./services/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Security scan images
  # ============================================================================
  scan-images:
    name: Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-images
    strategy:
      matrix:
        service:
          - api-gateway
          - ai-service
          - plugin-service
          - workflow-service
          - vector-service
          - frontend
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  # ============================================================================
  # Update K8s manifests (GitOps — Argo CD picks up changes)
  # ============================================================================
  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [build-images, scan-images]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"

      - name: Update image tags in prod overlay
        run: |
          cd k8s/overlays/prod
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          for service in api-gateway ai-service plugin-service workflow-service vector-service frontend; do
            kustomize edit set image "ghcr.io/${{ github.repository }}/${service}=ghcr.io/${{ github.repository }}/${service}:${SHORT_SHA}"
          done

      - name: Commit and push manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update prod images to ${{ github.sha }}"
            git push
          fi
