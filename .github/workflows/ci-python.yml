# ==============================================================================
# CI — Python Services (ai / plugin / workflow / vector)
# ==============================================================================
name: CI — Python Services

on:
  push:
    branches: [main]
    paths:
      - "services/ai-service/**"
      - "services/plugin-service/**"
      - "services/workflow-service/**"
      - "services/vector-service/**"
      - "pyproject.toml"
      - ".github/workflows/ci-python.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/ai-service/**"
      - "services/plugin-service/**"
      - "services/workflow-service/**"
      - "services/vector-service/**"
      - "pyproject.toml"
      - ".github/workflows/ci-python.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ai-service, plugin-service, workflow-service, vector-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

      - name: Mypy type check
        continue-on-error: true
        run: mypy app/ --config-file ../../pyproject.toml

  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ai-service, plugin-service, workflow-service, vector-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml

  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        service: [ai-service, plugin-service, workflow-service, vector-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nemo-${{ matrix.service }}:ci services/${{ matrix.service }}
