# ==============================================================================
# CI — Docker Build Validation
# ==============================================================================
# Ensures every Dockerfile builds successfully. Runs on any infrastructure or
# cross-cutting config change — catches Dockerfile regressions early.
# ==============================================================================
name: CI — Docker Build

on:
  push:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/ci-docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/ci-docker.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: services/api-gateway
          - service: ai-service
            context: services/ai-service
          - service: plugin-service
            context: services/plugin-service
          - service: workflow-service
            context: services/workflow-service
          - service: vector-service
            context: services/vector-service
          - service: frontend
            context: services/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: nemo-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
