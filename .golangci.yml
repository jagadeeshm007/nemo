# ==============================================================================
# golangci-lint configuration
# ==============================================================================

run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - typecheck
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - nilerr
    - exportloopref

linters-settings:
  govet:
    shadow: true
  goimports:
    local-prefixes: github.com/nemo-platform/nemo
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
  max-issues-per-linter: 0
  max-same-issues: 0
